  <g filter="url(#roughen-3)">
    <text x="195" y="258" text-anchor="end" font-family="'Inter', sans-serif" font-size="16" fill="#888888">Do Nothing</text>
    <path d="M 210,238 C 213,235 307,234 310,238 C 313,241 314,268 310,270 C 307,273 213,274 210,270 C 207,267 207,241 210,238 Z" fill="rgba(136,136,136,0.08)" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="325" y="260" font-family="'Inter', sans-serif" font-size="18" fill="#888888">12/60</text>
  </g>
