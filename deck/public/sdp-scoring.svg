<svg viewBox="0 0 700 350" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:700px;">
  <defs>
    <filter id="roughen-3" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="2" result="noise" seed="3"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow-3">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .sdp-bar { cursor: pointer; }
    .sdp-tip { opacity: 0; transition: opacity 0.2s ease; pointer-events: none; }
    .sdp-bar:hover .sdp-tip { opacity: 1; }
  </style>
  <text x="350" y="30" text-anchor="middle" font-family="'Inter', sans-serif" font-size="20" fill="#eee0cc" font-weight="700">Opportunity Ranking (Score / 60)</text>
  <!-- Bar 1: Ambient Content Engine — highlighted -->
  <g class="sdp-bar" filter="url(#roughen-3)">
    <text x="195" y="78" text-anchor="end" font-family="'Inter', sans-serif" font-size="16" fill="#eee0cc">Ambient Content Engine</text>
    <g filter="url(#glow-3)">
      <path d="M 210,58 C 213,55 627,54 630,58 C 633,61 634,88 630,90 C 627,93 213,94 210,90 C 207,87 207,61 210,58 Z" fill="rgba(77,207,201,0.25)" stroke="#4DCFC9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="645" y="80" font-family="'Inter', sans-serif" font-size="20" fill="#4DCFC9" font-weight="700">54/60</text>
    <g class="sdp-tip">
      <rect x="210" y="93" width="410" height="24" rx="5" fill="#161b22" stroke="#4DCFC9" stroke-width="1" opacity="0.95"/>
      <text x="222" y="109" font-family="'Inter', sans-serif" font-size="11" fill="#8b949e">Full-loop pipeline: signal scan &#8594; branded carousel &#8594; scheduled post</text>
    </g>
  </g>
  <!-- Bar 2: Bilrost / Hardened Sandbox -->
  <g class="sdp-bar" filter="url(#roughen-3)">
    <text x="195" y="138" text-anchor="end" font-family="'Inter', sans-serif" font-size="16" fill="#eee0cc">Bilrost / Sandbox</text>
    <path d="M 210,118 C 213,115 517,114 520,118 C 523,121 524,148 520,150 C 517,153 213,154 210,150 C 207,147 207,121 210,118 Z" fill="rgba(77,207,201,0.15)" stroke="#4DCFC9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="535" y="140" font-family="'Inter', sans-serif" font-size="18" fill="#4DCFC9">41/60</text>
    <g class="sdp-tip">
      <rect x="210" y="153" width="400" height="24" rx="5" fill="#161b22" stroke="#4DCFC9" stroke-width="1" opacity="0.95"/>
      <text x="222" y="169" font-family="'Inter', sans-serif" font-size="11" fill="#8b949e">Hardened Lima VM sandbox &#8212; STRIDE threat model + 273 CLI tests</text>
    </g>
  </g>
  <!-- Bar 3: Custom Skills Consulting -->
  <g class="sdp-bar" filter="url(#roughen-3)">
    <text x="195" y="198" text-anchor="end" font-family="'Inter', sans-serif" font-size="16" fill="#eee0cc">Skills Consulting</text>
    <path d="M 210,178 C 213,175 457,174 460,178 C 463,181 464,208 460,210 C 457,213 213,214 210,210 C 207,207 207,181 210,178 Z" fill="rgba(77,207,201,0.10)" stroke="#4DCFC9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="475" y="200" font-family="'Inter', sans-serif" font-size="18" fill="#4DCFC9">35/60</text>
    <g class="sdp-tip">
      <rect x="210" y="213" width="370" height="24" rx="5" fill="#161b22" stroke="#4DCFC9" stroke-width="1" opacity="0.95"/>
      <text x="222" y="229" font-family="'Inter', sans-serif" font-size="11" fill="#8b949e">Custom agent skill architecture and integration consulting</text>
    </g>
  </g>
  <!-- Bar 4: Do Nothing -->
  <g filter="url(#roughen-3)">
    <text x="195" y="258" text-anchor="end" font-family="'Inter', sans-serif" font-size="16" fill="#888888">Do Nothing</text>
    <path d="M 210,238 C 213,235 307,234 310,238 C 313,241 314,268 310,270 C 307,273 213,274 210,270 C 207,267 207,241 210,238 Z" fill="rgba(136,136,136,0.08)" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="325" y="260" font-family="'Inter', sans-serif" font-size="18" fill="#888888">12/60</text>
  </g>
  <!-- Bottom summary -->
  <!-- Separator line -->
  <line x1="180" y1="285" x2="520" y2="285" stroke="#eee0cc" stroke-width="0.5" opacity="0.1"/>
  <!-- Dimension badges -->
  <g opacity="0.75">
    <text x="350" y="306" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" fill="#8b949e" letter-spacing="0.04em">Scored on 6 weighted dimensions</text>
    <rect x="137" y="316" width="60" height="20" rx="10" fill="rgba(248,113,113,0.12)" stroke="#f87171" stroke-width="0.8"/>
    <text x="167" y="330" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#f87171">pain ×3</text>
    <rect x="205" y="316" width="66" height="20" rx="10" fill="rgba(248,113,113,0.12)" stroke="#f87171" stroke-width="0.8"/>
    <text x="238" y="330" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#f87171">spend ×3</text>
    <rect x="279" y="316" width="60" height="20" rx="10" fill="rgba(77,207,201,0.10)" stroke="#4DCFC9" stroke-width="0.8"/>
    <text x="309" y="330" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#4DCFC9">edge ×2</text>
    <rect x="347" y="316" width="60" height="20" rx="10" fill="rgba(77,207,201,0.10)" stroke="#4DCFC9" stroke-width="0.8"/>
    <text x="377" y="330" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#4DCFC9">time ×2</text>
    <rect x="415" y="316" width="56" height="20" rx="10" fill="rgba(136,136,136,0.08)" stroke="#888888" stroke-width="0.8"/>
    <text x="443" y="330" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#888888">gap ×1</text>
    <rect x="479" y="316" width="84" height="20" rx="10" fill="rgba(136,136,136,0.08)" stroke="#888888" stroke-width="0.8"/>
    <text x="521" y="330" text-anchor="middle" font-family="'Fira Code',monospace" font-size="9" fill="#888888">aud. ×1</text>
