<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:720px;">
  <defs>
    <filter id="roughen-8" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="2" result="noise" seed="8"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow-8">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Timeline axis — below bars -->
  <line x1="60" y1="218" x2="680" y2="218" stroke="#eee0cc" stroke-width="1.5" opacity="0.3"/>
  <!-- Months 1-2: $0 -->
  <g filter="url(#roughen-8)">
    <path d="M 80,190 C 83,187 197,186 200,190 C 203,193 204,208 200,210 C 197,213 83,214 80,210 C 77,207 77,193 80,190 Z" fill="rgba(136,136,136,0.08)" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="140" y="165" text-anchor="middle" font-family="'Inter', sans-serif" font-size="28" fill="#888888" font-weight="700">$0</text>
    <text x="140" y="245" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#eee0cc">Months 1-2</text>
    <text x="140" y="268" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#8b949e">audience building</text>
    <text x="140" y="288" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#8b949e">articles + LinkedIn</text>
  </g>
  <!-- Month 3: $3-8K -->
  <g filter="url(#roughen-8)">
    <path d="M 280,130 C 283,127 427,126 430,130 C 433,133 434,208 430,210 C 427,213 283,214 280,210 C 277,207 277,133 280,130 Z" fill="rgba(77,207,201,0.12)" stroke="#4DCFC9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="355" y="108" text-anchor="middle" font-family="'Inter', sans-serif" font-size="28" fill="#4DCFC9" font-weight="700">$3-8K</text>
    <text x="355" y="170" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#eee0cc">first pilot</text>
    <text x="355" y="245" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#eee0cc">Month 3</text>
    <text x="355" y="268" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#8b949e">managed pilot</text>
    <text x="355" y="288" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#8b949e">setup + retainer</text>
  </g>
  <!-- Month 6: $6-16K cumulative -->
  <g filter="url(#roughen-8)">
    <g filter="url(#glow-8)">
      <path d="M 500,70 C 503,67 667,66 670,70 C 673,73 674,208 670,210 C 667,213 503,214 500,210 C 497,207 497,73 500,70 Z" fill="rgba(77,207,201,0.18)" stroke="#4DCFC9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="585" y="56" text-anchor="middle" font-family="'Inter', sans-serif" font-size="28" fill="#4DCFC9" font-weight="700">$6-16K</text>
    <text x="585" y="130" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#eee0cc">cumulative</text>
    <text x="585" y="155" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#eee0cc">2-3 pilots</text>
    <text x="585" y="245" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#eee0cc">Month 6</text>
    <text x="585" y="268" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#8b949e">recurring retainers</text>
    <text x="585" y="288" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#8b949e">+ new setups</text>
  </g>
</svg>