<svg viewBox="0 0 740 280" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:740px;">
  <defs>
    <filter id="roughen-6" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="2" result="noise" seed="6"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow-6">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .tier-link { cursor: pointer; }
    .tier-link:hover text { fill: #eee0cc !important; }
  </style>
  <!-- Tier 1: Article Series -->
  <g filter="url(#roughen-6)">
    <path d="M 15,30 C 18,27 222,26 225,30 C 228,33 229,258 225,260 C 222,263 18,264 15,260 C 12,257 12,33 15,30 Z" fill="rgba(78,222,128,0.06)" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="120" y="60" text-anchor="middle" font-family="'Inter', sans-serif" font-size="18" fill="#4ade80" font-weight="700">Article Series</text>
    <text x="120" y="90" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#eee0cc">4 deep-dive articles</text>
