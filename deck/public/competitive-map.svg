<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:720px;">
  <defs>
    <filter id="roughen-9" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="2" result="noise" seed="9"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow-9">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .competitor { transition: transform 0.2s ease, opacity 0.2s ease; transform-origin: center; cursor: pointer; }
    .competitor:hover { transform: scale(1.12); opacity: 1 !important; }
    .competitor { opacity: 0.85; }
    @keyframes usPulse {
      0%, 100% { r: 38; opacity: 0.20; }
      50% { r: 42; opacity: 0.30; }
    }
    .us-glow { animation: usPulse 3s ease-in-out infinite; }
  </style>
  <!-- Axes -->
  <line x1="120" y1="410" x2="690" y2="410" stroke="#eee0cc" stroke-width="1" opacity="0.25"/>
  <line x1="120" y1="410" x2="120" y2="30" stroke="#eee0cc" stroke-width="1" opacity="0.25"/>
  <!-- Axis labels -->
  <text x="420" y="448" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#eee0cc" font-weight="600" letter-spacing="0.06em" opacity="0.6">PRICE</text>
  <text x="50" y="220" text-anchor="middle" font-family="'Inter', sans-serif" font-size="13" fill="#eee0cc" font-weight="600" letter-spacing="0.06em" opacity="0.6" transform="rotate(-90, 50, 220)">INTEGRATION DEPTH</text>
  <text x="140" y="432" font-family="'Inter', sans-serif" font-size="11" fill="#8b949e">Free</text>
  <text x="665" y="432" font-family="'Inter', sans-serif" font-size="11" fill="#8b949e">$2K+</text>
  <text x="128" y="400" font-family="'Inter', sans-serif" font-size="11" fill="#8b949e">Single</text>
  <text x="128" y="50" font-family="'Inter', sans-serif" font-size="11" fill="#8b949e">Full loop</text>
  <!-- Jasper -->
